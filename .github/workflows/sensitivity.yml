name: Sensitivity Check

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  sensitivity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run sensitivity test
        run: python3 test_sensitivity.py

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pytest
        run: pip install pytest
      - name: Run Python tests
        run: python3 -m pytest test_build.py -v
